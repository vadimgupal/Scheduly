app:
  auth-uri: ${AUTH_URI}
  client-id: ${CLIENT_ID}
  redirect-uri: ${REDIRECT_URI}
  token-uri: ${TOKEN_URI}
  client-secret: ${CLIENT_SECRET}

spring:
  application:
    name: Core
  data:
    redis:
      host: localhost
      port: 6379
  output:
    ansi:
      enabled: always

  liquibase:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  datasource:
    url: jdbc:postgresql://localhost:5435/scrapper
    username: postgres
    password: postgres

server:
  port: 8081

logging:
  charset:
    console: UTF-8
    file: UTF-8